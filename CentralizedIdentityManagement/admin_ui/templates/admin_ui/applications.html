{% extends "admin_ui/base.html" %}
{% block content %}
<h1>Application Settings</h1>
<div class="card">
    <h3>Add New Application</h3>

    <form method="post">
        {% csrf_token %}

        <div class="form-grid">

            <div class="form-group">
                <label>Application Name</label>
                <input name="name" required>
            </div>

            <div class="form-group">
                <label>Client ID</label>
                <input name="client_id" required>
            </div>

            <div class="form-group">
                <button>Add Application</button>
            </div>

        </div>

    </form>
</div>

<div class="card">
    <h3>Registered Applications</h3>
    <table>
        <tr>
            <th>Name</th>
            <th>Client ID</th>
            <th>Action</th>
        </tr>
        {% for app in applications %} <tr>
            <td>{{ app.name }}</td>
            <td>{{ app.client_id }}</td>
            <td>
                <a href="/admin-ui/applications/delete/{{ app.id }}/">Delete</a>
            </td>
        </tr> {% endfor %}
    </table>
</div>
{% endblock %}
