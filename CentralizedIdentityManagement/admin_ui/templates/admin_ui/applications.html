{% extends "admin_ui/base.html" %}
{% block content %}
<h1>Application Settings</h1>
<div class="card">
    <h3>Add New Application</h3>
    <form method="post"> {% csrf_token %}
        <label>Application Name</label> <input type="text" name="name" required>
        <label>Client ID</label> <input type="text" name="client_id" required>
        <button type="submit">Add Application</button>
    </form>
</div>

<div class="card">
    <h3>Registered Applications</h3>
    <table>
        <tr>
            <th>Name</th>
            <th>Client ID</th>
            <th>Action</th>
        </tr>
        {% for app in applications %} <tr>
            <td>{{ app.name }}</td>
            <td>{{ app.client_id }}</td>
            <td> <a href="{% url 'delete_app' app.id %}" class="danger-btn">Delete</a> </td>
        </tr> {% endfor %}
    </table>
</div>
{% endblock %}
