{% extends "admin_ui/base.html" %} {% block content %}

<div class="card">
    <h2>Edit Employee</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" value="{{ employee.name }}" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ employee.email }}" required>
        </div>

        <div class="form-group">
            <label>Contact Number</label>
            <input type="text" name="contact_number" value="{{ employee.contact_number }}">
        </div>

        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" value="{{ employee.title }}">
        </div>

        <div class="form-group">
            <label>Department</label>
            <input type="text" name="department" value="{{ employee.department }}">
        </div>

        <div class="form-group">
            <label>Join Date</label>
            <input type="date" name="join_date" value="{{ employee.join_date }}">
        </div>

        <div class="form-group">
            <label>Role</label>
            <select name="role_id">
                {% for r in roles %}
                <option value="{{ r.id }}" 
                {% if r.id == employee.role %}selected{% endif %}>
                    {{ r.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn-primary">Update</button>
        <a href="{% url 'employees' %}" class="btn-secondary">Cancel</a>

    </form>
</div>

{% endblock %}
