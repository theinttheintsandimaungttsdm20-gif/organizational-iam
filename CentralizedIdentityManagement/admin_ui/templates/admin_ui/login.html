{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>IAM Admin</title>
    <link rel="stylesheet" href="{% static 'admin_ui/style.css' %}">
</head>
<body>

<div class="login-wrapper">

    <div class="login-box">

        <h2>IAM Admin Login</h2>
        <p class="subtitle">Secure access to admin dashboard</p>
        {% if messages %}
        {% for message in messages %}
        {% if forloop.last %}
        <div class="message">
            {{ message }}
        </div>
        {% endif %}
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <label>Email</label>
            <input type="text" name="email" placeholder="admin@company.com" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
            <br>
            <button type="submit" class="login-btn">Login</button>
        </form>

        {% if error %}
        <div class="alert">{{ error }}</div>
        {% endif %}

    </div>

</div>
</body>
</html>
