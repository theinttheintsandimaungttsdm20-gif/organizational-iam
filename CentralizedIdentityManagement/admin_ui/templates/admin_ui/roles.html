{% extends "admin_ui/base.html" %}
{% block content %}
<h1>Role Settings</h1>
<div class="card">
    <h3>Add New Role</h3>
    <form method="post"> {% csrf_token %}
        <label>Role Name</label> <input type="text" name="name" required>
        <button type="submit">Add Role</button>
    </form>
</div>

<div class="card">
    <h3>Roles</h3>
    <table>
        <tr>
            <th>Name</th>
        </tr>
        {% for app in roles %} <tr>
            <td>{{ role.name }}</td>>
            <td> <a href="{% url 'delete_role' app.id %}" class="danger-btn">Delete</a> </td>
        </tr> {% endfor %}
    </table>
</div>
{% endblock %}
